# =============================================================================
#  FINSERV DEMO — Step 12: Cortex Analyst Semantic Model
#  Semantic model definition for natural-language-to-SQL via Cortex Analyst.
#  Upload this file to a Snowflake stage before creating a Cortex Agent.
# =============================================================================

name: finserv_semantic_model
description: >
  Financial services semantic model covering customer 360 profiles,
  daily financial metrics, channel performance, and risk dashboards.

tables:

  # ------------------------------------------------------------------
  # Customer 360 — full customer view with segments
  # ------------------------------------------------------------------
  - name: DT_CUSTOMER_360
    base_table:
      database: FINSERV_DB
      schema: CONSUMPTION
      table: DT_CUSTOMER_360
    description: >
      Complete customer profile including demographics, account balances,
      transaction history, risk scores, and loyalty segments.

    dimensions:
      - name: CUSTOMER_ID
        expr: CUSTOMER_ID
        data_type: NUMBER
        description: Unique customer identifier.
        unique: true

      - name: FIRST_NAME
        expr: FIRST_NAME
        data_type: TEXT
        description: Customer first name.

      - name: LAST_NAME
        expr: LAST_NAME
        data_type: TEXT
        description: Customer last name.

      - name: CITY
        expr: CITY
        data_type: TEXT
        description: Customer city.

      - name: COUNTRY
        expr: COUNTRY
        data_type: TEXT
        description: Customer country.

      - name: EMPLOYMENT_STATUS
        expr: EMPLOYMENT_STATUS
        data_type: TEXT
        description: Employment status (EMPLOYED, SELF_EMPLOYED, RETIRED, STUDENT, UNEMPLOYED).

      - name: CUSTOMER_SEGMENT
        expr: CUSTOMER_SEGMENT
        data_type: TEXT
        description: >
          Loyalty tier based on total balance.
          Values: PLATINUM (>250K), GOLD (>100K), SILVER (>25K), STANDARD.

    time_dimensions:
      - name: SIGNUP_DATE
        expr: SIGNUP_DATE
        data_type: TIMESTAMP_NTZ
        description: Date the customer signed up.

    measures:
      - name: TOTAL_BALANCE
        expr: TOTAL_BALANCE
        data_type: NUMBER
        description: Sum of all account balances for the customer.
        default_aggregation: sum

      - name: TOTAL_TRANSACTIONS
        expr: TOTAL_TRANSACTIONS
        data_type: NUMBER
        description: Lifetime transaction count.
        default_aggregation: sum

      - name: TOTAL_SPENT
        expr: TOTAL_SPENT
        data_type: NUMBER
        description: Lifetime transaction dollar volume (debits).
        default_aggregation: sum

      - name: LATEST_RISK_SCORE
        expr: LATEST_RISK_SCORE
        data_type: NUMBER
        description: Most recent risk assessment score (0-100).
        default_aggregation: avg

      - name: TOTAL_TICKETS
        expr: TOTAL_TICKETS
        data_type: NUMBER
        description: Count of support tickets filed.
        default_aggregation: sum

      - name: ANNUAL_INCOME
        expr: ANNUAL_INCOME
        data_type: NUMBER
        description: Customer annual income in USD.
        default_aggregation: avg

      - name: CREDIT_SCORE
        expr: CREDIT_SCORE
        data_type: NUMBER
        description: Credit score (300-850).
        default_aggregation: avg

      - name: CUSTOMER_COUNT
        expr: "1"
        data_type: NUMBER
        description: Count of customers.
        default_aggregation: sum

  # ------------------------------------------------------------------
  # Daily Financial Metrics — KPI aggregates by date
  # ------------------------------------------------------------------
  - name: DT_DAILY_FINANCIAL_METRICS
    base_table:
      database: FINSERV_DB
      schema: CONSUMPTION
      table: DT_DAILY_FINANCIAL_METRICS
    description: >
      Daily aggregated financial metrics including transaction counts,
      volumes, and flagged transaction rates.

    dimensions:
      - name: METRIC_DATE
        expr: METRIC_DATE
        data_type: DATE
        description: The date of the metrics.

    time_dimensions:
      - name: METRIC_DATE_TS
        expr: METRIC_DATE::TIMESTAMP_NTZ
        data_type: TIMESTAMP_NTZ
        description: Metric date as timestamp for time-series analysis.

    measures:
      - name: TOTAL_TRANSACTIONS
        expr: TOTAL_TRANSACTIONS
        data_type: NUMBER
        description: Total number of transactions on the given date.
        default_aggregation: sum

      - name: TOTAL_VOLUME
        expr: TOTAL_VOLUME
        data_type: NUMBER
        description: Total dollar volume on the given date.
        default_aggregation: sum

      - name: AVG_TRANSACTION
        expr: AVG_TRANSACTION
        data_type: NUMBER
        description: Average transaction amount for the date.
        default_aggregation: avg

      - name: UNIQUE_CUSTOMERS
        expr: UNIQUE_CUSTOMERS
        data_type: NUMBER
        description: Count of distinct customers transacting.
        default_aggregation: sum

      - name: FLAGGED_COUNT
        expr: FLAGGED_COUNT
        data_type: NUMBER
        description: Number of flagged/suspicious transactions.
        default_aggregation: sum

      - name: FLAGGED_RATE
        expr: FLAGGED_RATE
        data_type: NUMBER
        description: Percentage of transactions that are flagged.
        default_aggregation: avg

  # ------------------------------------------------------------------
  # Channel Performance — metrics by channel per day
  # ------------------------------------------------------------------
  - name: DT_CHANNEL_PERFORMANCE
    base_table:
      database: FINSERV_DB
      schema: CONSUMPTION
      table: DT_CHANNEL_PERFORMANCE
    description: >
      Transaction metrics broken down by channel (ONLINE, POS, MOBILE, ATM, BRANCH)
      and date.

    dimensions:
      - name: CHANNEL
        expr: CHANNEL
        data_type: TEXT
        description: Transaction channel (ONLINE, POS, MOBILE, ATM, BRANCH).

      - name: METRIC_DATE
        expr: METRIC_DATE
        data_type: DATE
        description: The date of channel performance metrics.

    time_dimensions:
      - name: METRIC_DATE_TS
        expr: METRIC_DATE::TIMESTAMP_NTZ
        data_type: TIMESTAMP_NTZ
        description: Performance date as timestamp.

    measures:
      - name: TRANSACTION_COUNT
        expr: TRANSACTION_COUNT
        data_type: NUMBER
        description: Number of transactions via this channel.
        default_aggregation: sum

      - name: TOTAL_VOLUME
        expr: TOTAL_VOLUME
        data_type: NUMBER
        description: Dollar volume through this channel.
        default_aggregation: sum

      - name: AVG_AMOUNT
        expr: AVG_AMOUNT
        data_type: NUMBER
        description: Average transaction amount for this channel.
        default_aggregation: avg

      - name: UNIQUE_CUSTOMERS
        expr: UNIQUE_CUSTOMERS
        data_type: NUMBER
        description: Distinct customers using this channel.
        default_aggregation: sum

  # ------------------------------------------------------------------
  # Risk Dashboard — risk distribution
  # ------------------------------------------------------------------
  - name: DT_RISK_DASHBOARD
    base_table:
      database: FINSERV_DB
      schema: CONSUMPTION
      table: DT_RISK_DASHBOARD
    description: >
      Risk score distribution with tier classification and customer demographics.

    dimensions:
      - name: CUSTOMER_ID
        expr: CUSTOMER_ID
        data_type: NUMBER
        description: Customer identifier.

      - name: CUSTOMER_NAME
        expr: CUSTOMER_NAME
        data_type: TEXT
        description: Customer full name.

      - name: RISK_TIER
        expr: RISK_TIER
        data_type: TEXT
        description: >
          Risk classification based on risk score.
          Values: CRITICAL (>80), HIGH (>60), MEDIUM (>40), LOW (>20), MINIMAL.

    measures:
      - name: LATEST_RISK_SCORE
        expr: LATEST_RISK_SCORE
        data_type: NUMBER
        description: Customer risk score (0-100).
        default_aggregation: avg

      - name: CREDIT_SCORE
        expr: CREDIT_SCORE
        data_type: NUMBER
        description: Customer credit score (300-850).
        default_aggregation: avg

      - name: TOTAL_BALANCE
        expr: TOTAL_BALANCE
        data_type: NUMBER
        description: Total account balances for the customer.
        default_aggregation: sum


# ------------------------------------------------------------------
# Verified queries for Cortex Analyst validation
# ------------------------------------------------------------------
verified_queries:

  - name: customers_by_segment
    question: "How many customers are in each segment?"
    sql: >
      SELECT CUSTOMER_SEGMENT, COUNT(*) AS CUSTOMER_COUNT
      FROM FINSERV_DB.CONSUMPTION.DT_CUSTOMER_360
      GROUP BY CUSTOMER_SEGMENT
      ORDER BY CUSTOMER_COUNT DESC

  - name: volume_by_channel
    question: "What is the total transaction volume by channel?"
    sql: >
      SELECT CHANNEL, SUM(TOTAL_VOLUME) AS TOTAL_VOLUME
      FROM FINSERV_DB.CONSUMPTION.DT_CHANNEL_PERFORMANCE
      GROUP BY CHANNEL
      ORDER BY TOTAL_VOLUME DESC

  - name: daily_flagged_rate
    question: "Show me the daily flagged transaction rate for the last 30 days"
    sql: >
      SELECT METRIC_DATE, FLAGGED_RATE
      FROM FINSERV_DB.CONSUMPTION.DT_DAILY_FINANCIAL_METRICS
      WHERE METRIC_DATE >= DATEADD('day', -30, CURRENT_DATE())
      ORDER BY METRIC_DATE

  - name: top_customers_by_balance
    question: "Who are the top 10 customers by total balance?"
    sql: >
      SELECT CUSTOMER_ID, FIRST_NAME, LAST_NAME, CUSTOMER_SEGMENT,
             TOTAL_BALANCE, TOTAL_TRANSACTIONS
      FROM FINSERV_DB.CONSUMPTION.DT_CUSTOMER_360
      ORDER BY TOTAL_BALANCE DESC
      LIMIT 10

  - name: customers_by_risk_tier
    question: "How many customers are in the critical risk tier?"
    sql: >
      SELECT RISK_TIER, COUNT(*) AS CUSTOMER_COUNT
      FROM FINSERV_DB.CONSUMPTION.DT_RISK_DASHBOARD
      GROUP BY RISK_TIER
      ORDER BY CUSTOMER_COUNT DESC
